name: Build for Windows 7 (64-bit)
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (格式 v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"
permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: ".exe"
    outputs:
      build_time: ${{ steps.set-build-time.outputs.BUILD_TIME }}
    steps:
      - name: Checkout code
        # 【修改点】：升级到 v5，原生支持 Node.js 24
        uses: actions/checkout@v5 
        with:
          fetch-depth: 0

      - name: Setup Go
        # 【修改点】：升级到 v6，原生支持 Node.js 24
        uses: actions/setup-go@v6 
        with:
          go-version: "1.20.14" 
          cache: false

      - name: Create Release Assets Directory
        run: mkdir -p "${{ github.workspace }}/release_assets"

      - name: Set Build Time
        id: set-build-time
        run: |
          build_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          echo "Building iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} from iptest.go..."
          go build -o ${{ github.workspace }}/release_assets/iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} iptest.go
        env:
         GOARCH: ${{ matrix.goarch }}
         GOOS: ${{ matrix.goos }} 

      - name: Generate SHA256
        run: |
          cd "${{ github.workspace }}/release_assets"
          for file in $(find . -type f ! -name '*.sha256'); do
            sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
          done
          echo "SHA256 files generated:"
          ls -1 *.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
          path: ${{ github.workspace }}/release_assets/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
steps:
      - name: Checkout code
        uses: actions/checkout@v5 
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6 
        with:
          go-version: "1.20.14" 
          cache: false

      - name: Create Release Assets Directory
        run: mkdir -p "${{ github.workspace }}/release_assets"

      - name: Set Build Time
        id: set-build-time
        run: |
          build_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

# 【修改步骤】：使用 sed 强制修改文本，绕过 go 命令的解析限制
      - name: Fix go.mod version for Go 1.20
        run: |
          if [ -f go.mod ]; then
            echo "Found go.mod, manually patching for Go 1.20 compatibility..."
            # 强制把 `go 1.xx` 修改为 `go 1.20`
            sed -i 's/^go .*/go 1.20/' go.mod
            # 强制删除 Go 1.21+ 生成的 toolchain 声明行（旧版 Go 不认识这一行）
            sed -i '/^toolchain /d' go.mod
            echo "Modified go.mod contents:"
            cat go.mod
            go mod tidy
          fi

      - name: Build
        run: |
          echo "Building iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} from iptest.go..."
          go build -o ${{ github.workspace }}/release_assets/iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} iptest.go
        env:
         GOARCH: ${{ matrix.goarch }}
         GOOS: ${{ matrix.goos }} 
         CGO_ENABLED: 0 # 显式禁用 CGO，避免跨平台编译踩坑
