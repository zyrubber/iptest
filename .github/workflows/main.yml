name: Build Windows amd64

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.20.14"

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o iptest-windows-amd64.exe iptest.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptest-windows-amd64
          path: iptest-windows-amd64.exe
