name: build-win7

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.20.14"

      - run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
          go build -ldflags "-s -w" -o app-win7-amd64.exe
